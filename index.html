<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body onload="getFromLocal()">

    <div class="container my-4">
        <div class="row g-2 mb-3">
            <div class="col-md-3"><input type="text" class="form-control" placeholder="Contact Name" autofocus id="contactName"></div>
            <div class="col-md-3"><input type="text" class="form-control" placeholder="Contact Picture URL" id="contactPicture"></div>
            <div class="col-md-3"><input type="tel" class="form-control" placeholder="Phone Number" id="phoneNumber"></div>
            <div class="col-md-3"><input type="email" class="form-control" placeholder="Email Address" id="emailAddress"></div>
        </div>
        <button id="saveButton" class="btn btn-primary mb-3" onclick="saveContact()">Save Contact</button>

        <div id="disp" style="display: none;">
            <button class="btn btn-danger mb-3" onclick="clearItems()">Delete All Contacts</button>
        </div>

        <h3>All Contacts</h3>
        <div id="contact" class="d-flex flex-wrap gap-3 mb-5"></div>

        <h3>Favourite Contacts</h3>
        <div id="favouritesContainer" class="d-flex flex-wrap gap-3"></div>
        </div>

    <script>
        let contactArray = [];

        function showButtons() {
            const dispDiv = document.getElementById("disp");
            if (contactArray.length === 0) {
                dispDiv.style.display = "none";
            } else {
                dispDiv.style.display = "block";
            }
        }

        function displayContact() {
            const contactContainer = document.getElementById("contact");
            contactContainer.innerHTML = "";
            
            for (let i = 0; i < contactArray.length; i++) {
                const isFav = contactArray[i].contactAdded;
                contactContainer.innerHTML += `
                <div class="card" style="width: 18rem;">
                    <img src="${contactArray[i].contactPicture || 'https://via.placeholder.com/150'}" class="card-img-top btn btn-rounded" alt="no image url given">
                    <div class="card-body">
                        <h5 class="card-title">${contactArray[i].contactName}</h5>
                        <p class="card-text">${contactArray[i].phoneNumber}</p>
                        <p class="card-text">${contactArray[i].emailAddress}</p>
                        <div class="d-flex flex-column gap-2">
                            <button class="btn btn-danger btn-sm" onclick="deleteItem(${i})">Delete Contact</button>
                            <button class="btn btn-secondary btn-sm" onclick="editContact(${i})">Edit Contact</button>
                            <button id="contactBtn${i}" class="btn btn-sm ${isFav ? 'btn-success' : 'btn-dark'}" onclick="toggleFavourite(${i})">
                                ${isFav ? 'Added to Favourite' : 'Add To Favourite'}
                            </button>
                        </div>
                    </div>
                </div>`;
            }
        }

        function saveContact() {
            let contactobj = {
                contactName: document.getElementById("contactName").value,
                contactPicture: document.getElementById("contactPicture").value,
                phoneNumber: document.getElementById("phoneNumber").value,
                emailAddress: document.getElementById("emailAddress").value,
                contactAdded: false
            };

            contactArray.push(contactobj);
            saveToLocal();
            displayContact();
            showButtons();
            //clr inputs
            document.getElementById("contactName").value = "";
            document.getElementById("contactPicture").value = "";
            document.getElementById("phoneNumber").value = "";
            document.getElementById("emailAddress").value = "";
        }

        function saveToLocal() {
            localStorage.setItem("contacts", JSON.stringify(contactArray));
        }

        function getFromLocal() {
            let itemsFromLocal = localStorage.getItem("contacts");
            contactArray = JSON.parse(itemsFromLocal) || [];
            displayContact();
            showButtons();
            updateFavouritesUI();
        }

        function updateFavouritesUI() {
            let favContainer = document.getElementById("favouritesContainer");
            if (!favContainer) return;

            let favourites = contactArray.filter(item => item.contactAdded === true);
            localStorage.setItem("FAVOURITE", JSON.stringify(favourites));
            
            favContainer.innerHTML = "";
            
            if (favourites.length === 0) {
                favContainer.innerHTML = "<p class='text-muted'>Your favourites list is empty.</p>";
                return;
            }
            
            favourites.forEach(contac => {
                favContainer.innerHTML += `
                <div class="card p-2" style="width: 18rem;">
                    <div class="d-flex align-items-center">
                        <img src="${contac.contactPicture || 'https://via.placeholder.com/50'}" style="width: 50px; height: 50px; object-fit: cover;" class="me-2" alt="...">
                        <div>
                            <h6 class="mb-0">${contac.contactName}</h6>
                            <small class="text-muted">${contac.phoneNumber}</small>
                        </div>
                    </div>
                </div>`;
            });
        }

        function clearItems() {
            contactArray = [];
            saveToLocal();
            displayContact();
            showButtons();
            updateFavouritesUI();
        }

        function deleteItem(index) {
            contactArray.splice(index, 1);
            saveToLocal();
            displayContact();
            showButtons();
            updateFavouritesUI();
        }

        function toggleFavourite(index) {
            contactArray[index].contactAdded = !contactArray[index].contactAdded;
            saveToLocal();
            displayContact();
            updateFavouritesUI();
        }

        function editContact(index) {
            const newcontactName = prompt("Contact name to edit?", contactArray[index].contactName);
            const newcontactPicture = prompt("Contact image to edit?", contactArray[index].contactPicture);
            const newphoneNumber = prompt("Phone Number to edit?", contactArray[index].phoneNumber);
            const newemailAddress = prompt("Email Address to edit?", contactArray[index].emailAddress);

            contactArray.splice(index, 1, {
                contactName: newcontactName ? newcontactName : contactArray[index].contactName,
                contactPicture: newcontactPicture ? newcontactPicture : contactArray[index].contactPicture,
                phoneNumber: newphoneNumber ? newphoneNumber : contactArray[index].phoneNumber,
                emailAddress: newemailAddress ? newemailAddress : contactArray[index].emailAddress,
                contactAdded: contactArray[index].contactAdded
            });
            
            saveToLocal();
            displayContact();
            updateFavouritesUI();
        }
    </script>
</body>
</html>
